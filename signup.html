<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAS Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex flex-col items-center justify-center sm:text-center w-full max-w-sm sm:max-w-md md:max-w-xl lg:max-w-3xl mx-auto p-4 sm:p-6 md:p-8">
        <form action="" method="post" id="signup-form" class="bg-gray-200 p-24 rounded-lg shadow-md flex flex-col items-center justify-center">
            <h1 class="text-2xl font-bold mb-6">AMAS</h1>
            <div class="mb-4 flex flex-row justify-center">
                <a href="./signup.html" class="mx-4 font-bold text-blue-500 opacity-50">Signup</a>
                     &sol;
                <a href="./index.html" class="mx-4 font-bold text-blue-500 ">Login</a>
            </div>
            <input type="text" id="first_name" name="first_name" placeholder="First Name" required class="border border-gray-300 rounded-md py-2 px-4 my-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="last_name" name="last_name" placeholder="Last Name" required class="border border-gray-300 rounded-md py-2 px-4 my-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="email" id="email" name="email" placeholder="Email" required class="border border-gray-300 rounded-md py-2 px-4 my-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" name="password" placeholder="Password" required class="border border-gray-300 rounded-md py-2 px-4 my-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required class="border border-gray-300 rounded-md py-2 px-4 my-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <br>
            <button type="submit" value="Submit" id="signup-button" onclick = "alert('Signup successful!')" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Sign-Up
            </button>
        </form>
    </div>
</body>
</html>
